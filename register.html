<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cash Nova | Register</title>

<link rel="stylesheet" href="../css/auth.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="left">

<div class="overlay">

<h1>Join Cash Nova</h1>

<p>
Create your account and start earning rewards, cashback, referrals and exclusive bonuses.
</p>

<a href="login.html" class="back-home">
Already have an account?
</a>

</div>

</div>

<div class="right">

<div class="login-card">

<h2>Create Account 🚀</h2>

<p class="subtitle">
Let's get you started.
</p>

<form id="registerForm">

<div class="input-group">
<label>Full Name</label>
<input type="text" id="fullname" placeholder="John Doe" required>
</div>

<div class="input-group">
<label>Username</label>
<input type="text" id="username" placeholder="john123" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email" placeholder="example@email.com" required>
</div>

<div class="input-group">
<label>Phone Number</label>
<input type="tel" id="phone" placeholder="+234..." required>
</div>

<div class="input-group">
<label>Country</label>
<input type="text" id="country" placeholder="Nigeria" required>
</div>

<div class="input-group">
<label>Password</label>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Create Password"
required>

<button
type="button"
id="togglePassword">
👁
</button>

</div>

</div>

<div class="input-group">
<label>Confirm Password</label>

<div class="password-box">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

<button
type="button"
id="toggleConfirm">
👁
</button>

</div>

</div>

<div class="input-group">
<label>Referral Code (Optional)</label>
<input type="text" id="referral" placeholder="Referral Code">
</div>

<label style="color:white;display:flex;gap:10px;margin-bottom:20px;">
<input type="checkbox" required>
I agree to the Terms & Privacy Policy
</label>

<button class="login-btn">
Create Account
</button>

<p class="register">

Already have an account?

<a href="login.html">
Login
</a>

</p>

</form>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
