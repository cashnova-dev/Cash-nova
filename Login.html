<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cash Nova | Login</title>

<style>*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#07131f;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
width:100%;
height:100vh;
}

.left{
background:linear-gradient(135deg,#10b981,#0f766e);
display:flex;
justify-content:center;
align-items:center;
padding:60px;
color:#fff;
}

.overlay{
max-width:420px;
}

.overlay h1{
font-size:48px;
margin-bottom:20px;
font-weight:700;
}

.overlay p{
font-size:18px;
line-height:1.8;
margin-bottom:40px;
opacity:.95;
}

.back-home{
display:inline-block;
padding:14px 30px;
background:white;
color:#10b981;
text-decoration:none;
border-radius:12px;
font-weight:600;
transition:.3s;
}

.back-home:hover{
transform:translateY(-3px);
}

.right{
display:flex;
justify-content:center;
align-items:center;
padding:40px;
background:#07131f;
}

.login-card{
width:100%;
max-width:430px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.08);
padding:40px;
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,.35);
}

.login-card h2{
color:#fff;
font-size:34px;
margin-bottom:8px;
}

.subtitle{
color:#94a3b8;
margin-bottom:35px;
}</style>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="container">

<div class="left">

<div class="overlay">

<h1>Cash Nova</h1>

<p>
Welcome back.
Securely access your dashboard,
manage your wallet,
track rewards,
cashback and tasks —
all in one place.
</p>

<a href="../index.html" class="back-home">
← Back Home
</a>

</div>

</div>

<div class="right">

<div class="login-card">

<h2>Welcome Back 👋</h2>

<p class="subtitle">
Login to continue
</p>

<form id="loginForm">

<div class="input-group">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter your email"
required>

</div>

<div class="input-group">

<label>Password</label>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Enter password"
required>

<button
type="button"
id="togglePassword">
👁
</button>

</div>

</div>

<div class="options">

<label>

<input
type="checkbox">

Remember me

</label>

<a href="forgot-password.html">

Forgot Password?

</a>

</div>

<button
type="submit"
class="login-btn">

Login

</button>

<p class="register">

Don't have an account?

<a href="register.html">

Create Account

</a>

</p>

</form>

</div>

</div>

</div> 
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>

</body>
</html>
